<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lens & Light — Photography Blog</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="body">

    <header class="header">
      <h1>Lens &amp; Light</h1>
      <p>A photography blog</p>
    </header>

    <div class="nav">
      <a class="nav-link" href="#">Home</a>
      <a class="nav-link" href="#">Gallery</a>
      <a class="nav-link" href="#">About</a>
    </div>

    <div class="hero">
      <h2 class="hero-title">Featured: Golden Hour Series</h2>
      <p class="hero-text">A collection of images captured at sunset across the city.</p>
    </div>



    <!-- MAIN — sidebar + images side by side -->
    <main class="main">
      <!-- SIDEBAR -->
      <div class="sidebar">

        <h2 class="sidebar-heading">Photo Info</h2>

        <div class="sidebar-detail">
          <p class="detail-label">Location</p>
          <p class="detail-value">Brooklyn, NY</p>
        </div>
        <div class="sidebar-tag">Golden Hour</div>
      </div>

      <!-- IMAGES — stacked in a column -->
      <div class="images">
        <div class="photo">Photo 1 — Sunset over bridge</div>
        <div class="photo">Photo 2 — Sunset over bridge</div>
      </div>
    </main>

    <footer class="footer">
      <p class="footer-text">&copy; 2026 Lens &amp; Light</p>
      <p class="footer-link">Instagram</p>
      <p class="footer-link">Twitter</p>
    </footer>

  </body>
</html>
